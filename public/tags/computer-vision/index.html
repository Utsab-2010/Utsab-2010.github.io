<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">

  crossorigin="anonymous"></script>

<script>
  

  
  const KATEX_CONFIG = {
    delimiters: [
      {left: "$$", right: "$$", display: true},
      {left: "$", right: "$", display: false},
      {left: "\\[", right: "\\]", display: true},
      {left: "\\(", right: "\\)", display: false}
    ],
    ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code"],
    throwOnError: false
  };

  
  function renderKatex() {
    
    if (typeof renderMathInElement !== "function") {
      console.log("⏳ Waiting for KaTeX to load...");
      return;
    }

    
    const contentArea = document.getElementById('swup') || document.body;

    try {
      renderMathInElement(contentArea, KATEX_CONFIG);
      console.log("✅ KaTeX rendered successfully");
    } catch (error) {
      console.error("❌ KaTeX rendering error:", error);
    }
  }

  
  function renderKatexWithRetry(maxRetries = 10, delay = 100) {
    let attempts = 0;

    const attempt = () => {
      if (typeof renderMathInElement === "function") {
        renderKatex();
      } else if (attempts < maxRetries) {
        attempts++;
        setTimeout(attempt, delay);
      } else {
        console.warn("⚠️ KaTeX auto-render not available after", maxRetries, "attempts");
      }
    };

    attempt();
  }

  
  function setupSwupIntegration() {
    
    if (window.swup) {
      window.swup.hooks.on('page:view', () => {
        console.log("🔄 Swup transition complete, re-rendering KaTeX...");
        
        setTimeout(() => renderKatexWithRetry(3, 50), 50);
      });
      console.log("✅ KaTeX-Swup integration ready");
    } else {
      
      setTimeout(setupSwupIntegration, 100);
    }
  }

  
  document.addEventListener("DOMContentLoaded", function () {
    console.log("🚀 Initializing KaTeX...");

    
    renderKatexWithRetry();

    
    setupSwupIntegration();
  });

  
  window.renderKatex = renderKatex;
</script>

<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  let initialized = false;

  function renderMermaid() {
    const contentArea = document.getElementById('swup') || document.body;
    const mermaidBlocks = contentArea.querySelectorAll('.language-mermaid, .mermaid');

    if (mermaidBlocks.length === 0) {
      console.log("ℹ️ No mermaid blocks found on this page");
      return;
    }

    if (!initialized) {
      mermaid.initialize({startOnLoad: false, theme: 'dark'});
      initialized = true;
    }

    mermaidBlocks.forEach(el => {
      if (el.dataset.processed === 'true') {
        const source = el.dataset.mermaidSource;
        if (source) {
          el.innerHTML = source;
          el.removeAttribute('data-processed');
        }
      } else {
        el.dataset.mermaidSource = el.textContent;
      }
    });

    mermaid.run({nodes: mermaidBlocks})
      .then(() => console.log("✅ Mermaid rendered successfully"))
      .catch(err => console.error("❌ Mermaid rendering error:", err));
  }

  function renderMermaidWithRetry(maxRetries = 10, delay = 100) {
    let attempts = 0;

    const attempt = () => {
      if (typeof mermaid.initialize === "function") {
        renderMermaid();
      } else if (attempts < maxRetries) {
        attempts++;
        setTimeout(attempt, delay);
      } else {
        console.warn("⚠️ Mermaid auto-render not available after", maxRetries, "attempts");
      }
    };

    attempt();
  }

  
  function setupSwupIntegration() {
    
    if (window.swup) {
      window.swup.hooks.on('page:view', () => {
        console.log("🔄 Swup transition complete, re-rendering mermaid...");
        
        setTimeout(() => renderMermaidWithRetry(3, 50), 50);
      });
      console.log("✅ Mermaid-Swup integration ready");
    } else {
      
      setTimeout(setupSwupIntegration, 100);
    }
  }

  
  document.addEventListener("DOMContentLoaded", function () {
    console.log("🚀 Initializing KaTeX...");

    
    renderMermaidWithRetry();

    
    setupSwupIntegration();
  });



</script>
