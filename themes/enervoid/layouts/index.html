{{ define "main" }}

<section class="relative border border-gray-200 bg-[#070709] rounded-sm p-8 md:p-12 text-gray-300">

  <div class="flex flex-col-reverse md:flex-row gap-8 items-center md:items-start">
    <div class="flex-1">
      <!-- Heading -->
      <h1 class="text-2xl sm:text-3xl md:text-4xl font-semibold text-blue-200 mb-6 tracking-wide">
        About Me
        <!-- <span class="inline-block mr-3" style="animation: flicker 1.8s steps(2,end) infinite;">_</span> -->
      </h1>

      <!-- Content -->
      <div class="space-y-6 text-base sm:text-lg md:text-xl leading-relaxed [&_a]:text-blue-200
                [&_a]:underline
                [&_a:hover]:text-blue-100
                [&_a]:transition-colors
                [&_a]:duration-200">

        {{ with site.GetPage "page" "about.md"}}
        {{ .Content}}
        {{ end }}

      </div>
    </div>
    
    <!-- Profile Picture -->
    <div class="shrink-0 md:pt-4">
      <img src='{{ with site.Params.avatar }}{{ . | relURL }}{{ else }}{{ "/images/avatar.jpg" | relURL }}{{ end }}' alt="Profile Picture" class="w-40 h-40 md:w-56 md:h-56 rounded-full border-4 border-gray-700 object-cover shadow-xl" />
    </div>
  </div>

</section>
{{ end }}
