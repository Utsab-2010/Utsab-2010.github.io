{{ if .Site.Params.comments.enable }}
<section class="mt-12 pt-8 border-t border-gray-200 dark:border-gray-800">
  <div class="mb-6">
    <h3 class="text-xl font-bold text-gray-900 dark:text-white">Comments</h3>
    <p class="text-sm text-gray-600 dark:text-gray-400">Join the discussion via GitHub.</p>
  </div>
  <script src="https://giscus.app/client.js"
          data-repo="{{ .Site.Params.comments.repo }}"
          data-repo-id="{{ .Site.Params.comments.repoId }}"
          data-category="{{ .Site.Params.comments.category }}"
          data-category-id="{{ .Site.Params.comments.categoryId }}"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="bottom"
          data-theme="preferred_color_scheme"
          data-lang="en"
          crossorigin="anonymous"
          async>
  </script>

  <script>
    function updateGiscusTheme() {
      const theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
      const iframe = document.querySelector('iframe.giscus-frame');
      if (!iframe) return;
      iframe.contentWindow.postMessage({ giscus: { setConfig: { theme: theme } } }, 'https://giscus.app');
    }

    // Update theme when the site theme changes
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
          updateGiscusTheme();
        }
      });
    });

    observer.observe(document.documentElement, { attributes: true });
    
    // Initial theme set
    window.addEventListener('message', (event) => {
      if (event.origin !== 'https://giscus.app') return;
      if (!(typeof event.data === 'object' && event.data.giscus)) return;
      updateGiscusTheme();
    });
  </script>
</section>
{{ end }}
