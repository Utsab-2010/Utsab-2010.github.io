<div class="border-t border-nav-border bg-nav-bg text-gray-600 dark:text-gray-400">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <div class="flex flex-col md:flex-row items-center justify-between py-6 space-y-4 md:space-y-0">

      <!-- Left Side -->
      <div class="text-sm sm:text-base md:text-lg">
        <span class="relative inline-block">
          © {{ now.Year }} {{ site.Title }}. All rights reserved. <br>
          Made with <a href="https://gohugo.io" target="_blank">Hugo</a> | <a
            href="https://github.com/Enerhim/enervoid-theme" target="_blank">Enervoid</a>
        </span>
      </div>

      <!-- Right Side (Socials) -->
      <div class="flex items-center space-x-6 text-sm sm:text-base md:text-lg">

        {{ range site.Params.socials }}
        <a href='{{ .link }}' target="_blank" rel="noopener" title="{{ .name }}"
          class="group relative inline-block transition-colors duration-200 hover:text-gray-800 dark:text-gray-200">
          <i class="{{ .icon }}"></i>
          <span
            class="absolute left-0 -bottom-1 h-[2px] w-0 bg-accent transition-all duration-300 group-hover:w-full"></span>
          
          <!-- Custom Tooltip -->
          {{ with .name }}
          <span class="pointer-events-none absolute bottom-full left-1/2 -translate-x-1/2 mb-2 scale-90 opacity-0 group-hover:scale-100 group-hover:opacity-100 transition-all duration-150 ease-out bg-gray-900 dark:bg-gray-800 text-white dark:text-gray-100 text-[11px] font-medium py-1 px-2.5 rounded shadow-lg border border-gray-700/30 whitespace-nowrap">
            {{ . }}
          </span>
          {{ end }}
        </a>
        {{ end }}

      </div>
    </div>
  </div>
</div>
