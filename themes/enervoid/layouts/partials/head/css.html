  rel="stylesheet">

<style type="text/tailwindcss">
  @theme {
    /* Map Tailwind classes to our centralized CSS variables */
    --color-bg-light: var(--bg-light);
    --color-bg-dark: var(--bg-dark);
    --color-accent: var(--accent);
    --color-accent-hover: var(--accent-hover);
    --color-nav-bg: var(--nav-bg);
    --color-nav-border: var(--nav-border);
    --color-nav-text: var(--nav-text);
    --color-card-bg: var(--card-bg);
    --color-card-border: var(--card-border);
    --color-text-heading: var(--text-heading);
    --color-text-body: var(--text-body);
    --color-blockquote-bg: var(--blockquote-bg);
    --color-blockquote-text: var(--blockquote-text);
  }
  @custom-variant dark (&:where(.dark, .dark *));

  .md-content h1 { @apply mt-10 mb-4 text-3xl sm:text-5xl font-bold leading-tight; color: var(--text-heading); }
  .md-content h2 { @apply mt-8 mb-4 text-2xl sm:text-4xl font-bold leading-snug; color: var(--text-heading); }
  .md-content h3 { @apply mt-6 mb-3 text-xl sm:text-3xl font-semibold leading-snug; color: var(--text-heading); }
  .md-content h4 { @apply mt-5 mb-2 text-lg sm:text-2xl font-semibold; color: var(--text-heading); }
  
  .md-content a { 
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-color: var(--accent-mute);
    transition: all 0.20s ease-out;
  }
  .md-content a:hover {
    color: var(--accent-hover);
    text-decoration-color: var(--accent-hover);
  }
  
  .md-content pre { 
    @apply p-3 sm:p-6 my-4 sm:my-6 rounded-sm overflow-x-auto; 
    background-color: var(--code-bg);
    border: 1px solid var(--code-border);
  }
  .md-content code { @apply font-mono text-xs sm:text-sm; }
  
  .md-content blockquote { 
    @apply pl-4 sm:pl-5 py-2 sm:py-3 my-5 sm:my-6 rounded-r-lg text-base sm:text-[17px]; 
    border-left: 3px solid var(--accent);
    background-color: var(--blockquote-bg);
    color: var(--blockquote-text);
  }

  /* Centralized Tag Badge Class */
  .tag-badge {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    font-size: 0.75rem;
    border-radius: 0.125rem;
    border: 1px solid var(--tag-border);
    background-color: var(--tag-bg);
    color: var(--tag-text);
    transition: all 0.2s ease;
  }
  @media (min-width: 640px) {
    .tag-badge {
      font-size: 0.875rem;
    }
  }
  a.tag-badge:hover {
    color: var(--tag-text-hover) !important;
    border-color: var(--tag-border-hover) !important;
    background-color: var(--tag-bg-hover);
  }
</style>
<style>
  html {
    /* ========================================================
       ONE PLACE FOR ALL COLOR VARIABLES (LIGHT & DARK MODE)
       ======================================================== */

    /* --- LIGHT MODE VARIABLES (Warm Greenish Theme) --- */
    --bg-light: #E8ECD7;
    /* soft kiwi-sorbet/linen green */
    --card-bg: #fbfcf2;
    /* warm cream paper-white */
    --card-border: rgba(185, 199, 152, 0.45);
    /* soft olive border */

    --text-heading: #121F0D;
    /* deepest forest dark green */
    --text-body: #2D3528;
    /* deep charcoal-green */

    /* Accent & Brand Colors */
    --accent: #526531;
    /* Basil Green */
    --accent-mute: rgba(82, 101, 49, 0.25);
    --accent-hover: #30401C;
    /* Ceylanite */

    /* Code Blocks */
    --code-bg: #FAF9F5;
    --code-border: rgba(185, 199, 152, 0.4);

    /* Blockquotes */
    --blockquote-bg: #FCFAF2;
    --blockquote-text: #2D3528;

    /* Tag Badges */
    --tag-bg: #FAF9F5;
    --tag-bg-hover: rgba(82, 101, 49, 0.08);
    --tag-border: rgba(185, 199, 152, 0.5);
    --tag-text: #526531;
    --tag-text-hover: #121F0D;
    --tag-border-hover: #526531;

    /* Navigation Ribbons */
    --nav-bg: #dadfc7;
    /* matching cream with opacity */
    --nav-border: rgba(185, 199, 152, 0.45);
    --nav-text: #30401C;
    /* Ceylanite */

    /* TOC Menu & Sidebar Links */
    --toc-link-color: rgba(48, 64, 28, 0.85);
    --toc-link-hover: #121F0D;

    /* Borders & Alphas */
    --border-alpha: rgba(185, 199, 152, 0.5);

    /* Selection Highlight */
    --selection-bg: rgba(82, 101, 49, 0.15);

    /* Global settings */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  html.dark {
    /* --- DARK MODE VARIABLES --- */
    --bg-dark: #070709;
    --card-bg: #121316;
    --card-border: rgba(55, 65, 81, 0.6);

    --text-heading: #ffffff;
    --text-body: #f3f4f6;

    /* Accent & Brand Colors */
    --accent: #818cf8;
    /* indigo-400 */
    --accent-mute: rgba(129, 140, 248, 0.3);
    --accent-hover: #a5b4fc;
    /* indigo-300 */

    /* Code Blocks */
    --code-bg: #1e1e1e;
    --code-border: rgba(55, 65, 81, 0.7);

    /* Blockquotes */
    --blockquote-bg: rgba(31, 41, 55, 0.4);
    --blockquote-text: #d1d5db;

    /* Tag Badges */
    --tag-bg: rgba(0, 0, 0, 0.3);
    --tag-bg-hover: rgba(129, 140, 248, 0.1);
    --tag-border: rgba(55, 65, 81, 0.7);
    --tag-text: #d1d5db;
    --tag-text-hover: #ffffff;
    --tag-border-hover: rgba(129, 140, 248, 0.4);

    /* Navigation Ribbons (Dark) */
    --nav-bg: rgba(7, 7, 9, 0.95);
    --nav-border: rgba(55, 65, 81, 0.6);
    --nav-text: #f3f4f6;
    /* gray-100 */

    /* TOC Menu & Sidebar Links (Dark) */
    --toc-link-color: rgba(209, 213, 219, 0.92);
    --toc-link-hover: #fff;

    /* Borders & Alphas (Dark) */
    --border-alpha: rgba(55, 65, 81, 0.6);

    /* Selection Highlight (Dark) */
    --selection-bg: rgba(129, 140, 248, 0.3);
  }

  ::selection {
    background: var(--selection-bg);
    color: inherit;
  }

  .font-jersey {
    font-family: "Ubuntu Sans Mono", monospace;
    font-optical-sizing: auto;
    font-style: normal;
  }


  .md-content .katex-display {
    max-width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    padding-left: 0.25rem;
    padding-right: 0.25rem;
  }

  .md-content .katex-display>.katex {
    display: inline-block;
    max-width: 100%;
  }

  .swup-transition-fade {
    opacity: 1;
    will-change: opacity;
    transition: opacity 150ms ease-out;
  }

  html.is-animating .swup-transition-fade {
    opacity: 0;
  }

  html.is-animating {
    cursor: progress;
  }

  html.is-leaving .swup-transition-fade {
    opacity: 0;
  }
</style>
