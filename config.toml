baseURL = 'https://utsab-2010.github.io/'
languageCode = 'en-us'
title = "Utsab Karan"
theme = "enervoid"

[menus]
  [[menus.main]]
    name = 'Blogs'
    url = '/blog/'
    weight = 10

  [[menus.main]]
    name = 'Projects'
    url = '/projects/'
    weight = 30

  [[menus.main]]
    name = 'Work'
    url = '/work/'
    weight = 40

[params]
  avatar = "avatar.png"

  [params.comments]
    enable = true
    repo = "Utsab-2010/Utsab-2010.github.io" # Updated repo name
    repoId = "R_kgDOSVop4A"                  # Fill this after enabling Discussions
    category = "General"         # Or any other category you prefer
    categoryId = "DIC_kwDOSVop4M4C8gg4"              # Fill this after enabling Discussions

  [[params.socials]]
      link = "https://github.com/Utsab-2010"
      icon = "devicon-github-original"
   [[params.socials]]
      link = "https://www.linkedin.com/in/utsab-karan/"
      icon = "devicon-linkedin-plain"
    [[params.socials]]
      link = "https://scholar.google.com/citations?user=V0Lvy54AAAAJ&hl=en"
      icon = "fa-solid fa-graduation-cap" 
    [[params.socials]]
      link = "/resume_ukaran.pdf"
      icon = "fa-solid fa-file-lines"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$','$$'], ['\\[','\\]']]
        inline = [['$','$'], ['\\(','\\)']]

    [markup.goldmark.parser]
      attribute = true

    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    startLevel = 2

[markup.highlight]
  noClasses = true
  codeFences = true
  guessSyntax = true
  tabWidth = 4
  style = "dracula"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

